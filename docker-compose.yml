# ── Red Team Agent — Docker Compose ──────────────────────────────────────────
# Services:
#   redteam    — the AI agent (main app)
#   qdrant     — vector database (knowledge base)
#   neo4j      — attack graph database
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: redteam_qdrant
    ports:
      - "6333:6333"     # REST API
      - "6334:6334"     # gRPC
    volumes:
      # Mount your existing Qdrant data (Windows path → container)
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - redteam_net

  # ── Neo4j Attack Graph ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20
    container_name: redteam_neo4j
    ports:
      - "7474:7474"     # Browser UI → http://localhost:7474
      - "7687:7687"     # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/redteam2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "redteam2024", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - redteam_net

  # ── Red Team Agent ─────────────────────────────────────────────────────────
  redteam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam_agent
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      # Mount Qdrant data from host into container
      - qdrant_data:/app/qdrant_data:ro
      # Reports output — readable on host
      - ./reports:/app/reports
      # Logs output
      - ./logs:/app/logs
      # Live code reload (dev mode)
      - .:/app
    environment:
      # ── LLM ──────────────────────────────────────────────────
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL_HEAVY=${GROQ_MODEL_HEAVY:-llama-3.3-70b-versatile}
      - GROQ_MODEL_FAST=${GROQ_MODEL_FAST:-qwen-qwq-32b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      # ── Qdrant (container address) ────────────────────────────
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_PATH=/app/qdrant_data
      # ── Neo4j (container address) ─────────────────────────────
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=redteam2024
      # ── Campaign ─────────────────────────────────────────────
      - STEALTH_LEVEL=${STEALTH_LEVEL:-high}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REPORTS_DIR=/app/reports
      - TARGET_ENV=medflow
    # Network access needed for scanning
    network_mode: host
    # Required for nmap raw socket access
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # Run interactively
    stdin_open: true
    tty: true
    restart: "no"

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  redteam_net:
    driver: bridge